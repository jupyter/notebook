name: Binder Badge
on:
  pull_request_target:
    types: [opened]

permissions:
  contents: read

jobs:
  binder:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: jupyterlab/maintainer-tools/.github/actions/binder-link@95d85449e4f3f352e261221f6529f8ed307f5728 # v1
        with:
          github_token: ${{ secrets.github_token }}
          url_path: tree
